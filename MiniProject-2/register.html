<!DOCTYPE html>
<html   lang="en">
<head>
<title>Event Registration Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container-fluid">
<a class="navbar-brand">Upgrad Events</a>
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
<li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>

</ul>
</div>

<div class="container mt-5">
<div id="alertBox"></div>

<h3>Event Registration</h3>

<div class="card p-3">

<h5>Event Details</h5>

<p id="eventId"></p>
<p id="eventName"></p>
<p id="eventCategory"></p>
<p id="eventDate"></p>
<p id="eventTime"></p>

</div>

<div class="card p-3 mt-3">

<h5>Participant Details</h5>

<input id="fname" class="form-control mb-2" placeholder="First Name" required>

<input id="lname" class="form-control mb-2" placeholder="Last Name" required>

<input id="email" type="email" class="form-control mb-2" placeholder="Email" required>

<div>
    <button class="btn btn-success" onclick="registerEvent()" type="button">Register</button>
</div>

</div>


</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
