<!DOCTYPE html>
<html>
<head>

<title>Manage Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container-fluid">
<a class="navbar-brand">Upgrad Events</a>
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
<li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
</ul>
<button onclick="logout()" class="btn btn-danger">
Logout
</button>

</div>
</nav>

<div class="container mt-4">
<div id="alertBox"></div>
<div class="d-flex justify-content-between">

<h3>Manage Events</h3>


</div>

<hr>

<!-- ADD EVENT FORM -->

<h5>Add Event</h5>

<input id="eventId" class="form-control mt-2" placeholder="Event ID" required>

<input id="eventName" class="form-control mt-2" placeholder="Event Name" required>

<select id="category" class="form-control mt-2" required>

<option value="">Select Category</option>
<option>Tech & Innovations</option>
<option>Industrial Event</option>

</select>

<input type="date" id="date" class="form-control mt-2" required>

<input type="time" id="time" class="form-control mt-2" required>

<input type="url" id="url" class="form-control mt-2" placeholder="Event URL" required>

<button onclick="addEvent()" class="btn btn-success mt-3">
Add Event
</button>

<hr>

<!-- SEARCH EVENT -->

<h5>Search Event</h5>

<div class="row">

<div class="col-md-4">
<input id="searchCategory" class="form-control" placeholder="Category">
</div>

<div class="col-md-4">
<input id="searchName" class="form-control" placeholder="Event Name">
</div>

<div class="col-md-4">
<button onclick="searchEvent()" class="btn btn-primary w-100">
Search
</button>
</div>

</div>

<!-- EVENT CARDS -->

<div class="row mt-4" id="eventContainer"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="Scripts/events.js"></script>

</body>
</html>
